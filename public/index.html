<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Das stumme Archiv</title>
  <style>
    :root {
      --bg: #0b0b0e;
      --panel: rgba(20, 20, 28, 0.82);
      --line: rgba(180, 180, 210, 0.18);
      --text: #e7e2d5;
      --muted: #9f9887;
      --accent: #d4c19a;
      --danger: #b35a5a;
      --shadow: 0 20px 60px rgba(0, 0, 0, 0.45);
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      min-height: 100vh;
      font-family: Georgia, "Times New Roman", serif;
      color: var(--text);
      background:
        radial-gradient(circle at top, rgba(120, 90, 50, 0.12), transparent 35%),
        linear-gradient(180deg, #0d0d12 0%, #070709 100%);
      display: grid;
      place-items: center;
      padding: 24px;
    }

    .panel {
      width: min(760px, 100%);
      background: var(--panel);
      border: 1px solid var(--line);
      border-radius: 18px;
      box-shadow: var(--shadow);
      padding: 32px;
      backdrop-filter: blur(8px);
    }

    .eyebrow {
      letter-spacing: 0.18em;
      text-transform: uppercase;
      color: var(--muted);
      font-size: 0.82rem;
      margin-bottom: 12px;
    }

    h1 {
      margin: 0 0 12px;
      font-size: clamp(2rem, 5vw, 3.2rem);
      line-height: 1.05;
      font-weight: 600;
    }

    p {
      margin: 0;
      color: var(--muted);
      line-height: 1.7;
      font-size: 1.03rem;
    }

    .countdown {
      display: grid;
      grid-template-columns: repeat(4, minmax(0, 1fr));
      gap: 14px;
      margin: 30px 0 24px;
    }

    .tile {
      border: 1px solid var(--line);
      border-radius: 16px;
      padding: 18px 12px;
      text-align: center;
      background: rgba(255, 255, 255, 0.02);
    }

    .value {
      display: block;
      font-size: clamp(1.9rem, 4vw, 3rem);
      color: var(--accent);
      margin-bottom: 4px;
      font-variant-numeric: tabular-nums;
    }

    .label {
      font-size: 0.88rem;
      text-transform: uppercase;
      letter-spacing: 0.12em;
      color: var(--muted);
    }

    .status {
      margin-top: 8px;
      color: var(--muted);
      font-size: 0.96rem;
    }

    .hint {
      display: none;
      margin-top: 26px;
      padding: 22px;
      border-radius: 16px;
      border: 1px solid rgba(212, 193, 154, 0.32);
      background: rgba(212, 193, 154, 0.06);
    }

    .hint.visible { display: block; }

    .hint-title {
      margin: 0 0 10px;
      color: var(--accent);
      font-size: 1.2rem;
    }

    .hint-body {
      color: var(--text);
      white-space: pre-wrap;
      line-height: 1.8;
    }

    .hidden {
      display: none;
    }

    .error {
      margin-top: 16px;
      color: var(--danger);
      font-size: 0.95rem;
    }

    @media (max-width: 640px) {
      .panel { padding: 22px; }
      .countdown { grid-template-columns: repeat(2, minmax(0, 1fr)); }
    }
  </style>
</head>
<body>
  <main class="panel">
    <div class="eyebrow">Das stumme Archiv</div>
    <h1>Der zweite Mund ist noch verschlossen.</h1>
    <p>
      Die Schrift gibt ihr Maß nicht sofort preis. Erst wenn die letzte Stunde des Wartens fällt,
      wird der verborgene Hinweis aus dem Schweigen treten.
    </p>

    <section class="countdown" aria-label="Countdown bis zur Enthüllung">
      <div class="tile"><span class="value" id="days">00</span><span class="label">Tage</span></div>
      <div class="tile"><span class="value" id="hours">00</span><span class="label">Stunden</span></div>
      <div class="tile"><span class="value" id="minutes">00</span><span class="label">Minuten</span></div>
      <div class="tile"><span class="value" id="seconds">00</span><span class="label">Sekunden</span></div>
    </section>

    <div class="status" id="status">Verbleibende Zeit wird geladen…</div>
    <div class="error hidden" id="error"></div>

    <section class="hint" id="hintBox">
      <h2 class="hint-title">Der Schleier weicht.</h2>
      <div class="hint-body" id="hintBody"></div>
    </section>
  </main>

  <script>
    const els = {
      days: document.getElementById('days'),
      hours: document.getElementById('hours'),
      minutes: document.getElementById('minutes'),
      seconds: document.getElementById('seconds'),
      status: document.getElementById('status'),
      error: document.getElementById('error'),
      hintBox: document.getElementById('hintBox'),
      hintBody: document.getElementById('hintBody')
    };

    let releaseAt = null;
    let serverOffset = 0;
    let countdownTimer = null;
    let hintLoaded = false;

    function pad(value) {
      return String(value).padStart(2, '0');
    }

    function showError(message) {
      els.error.textContent = message;
      els.error.classList.remove('hidden');
    }

    function hideError() {
      els.error.textContent = '';
      els.error.classList.add('hidden');
    }

    function updateTiles(remainingMs) {
      const totalSeconds = Math.max(0, Math.floor(remainingMs / 1000));
      const days = Math.floor(totalSeconds / 86400);
      const hours = Math.floor((totalSeconds % 86400) / 3600);
      const minutes = Math.floor((totalSeconds % 3600) / 60);
      const seconds = totalSeconds % 60;

      els.days.textContent = pad(days);
      els.hours.textContent = pad(hours);
      els.minutes.textContent = pad(minutes);
      els.seconds.textContent = pad(seconds);
    }

    async function fetchStatus() {
      const response = await fetch('/api/status', { cache: 'no-store' });
      if (!response.ok) {
        throw new Error('Status konnte nicht geladen werden.');
      }
      return response.json();
    }

    async function fetchHint() {
      const response = await fetch('/api/hint', { cache: 'no-store' });
      const data = await response.json();

      if (!response.ok) {
        throw new Error(data.error || 'Hinweis noch nicht verfügbar.');
      }

      return data.hint || '';
    }

    async function revealHint() {
      if (hintLoaded) return;
      hintLoaded = true;

      try {
        hideError();
        const hint = await fetchHint();
        els.hintBody.textContent = hint;
        els.hintBox.classList.add('visible');
        els.status.textContent = 'Die Warte hat gesprochen.';
      } catch (error) {
        hintLoaded = false;
        showError(error.message);
      }
    }

    function getEstimatedServerNow() {
      return Date.now() + serverOffset;
    }

    function tick() {
      const remainingMs = Math.max(0, releaseAt - getEstimatedServerNow());
      updateTiles(remainingMs);

      if (remainingMs <= 0) {
        els.status.textContent = 'Der Schleier fällt…';
        clearInterval(countdownTimer);
        revealHint();
        return;
      }

      const totalSeconds = Math.ceil(remainingMs / 1000);
      const hours = Math.floor((totalSeconds % 86400) / 3600);
      const minutes = Math.floor((totalSeconds % 3600) / 60);
      const seconds = totalSeconds % 60;
      const days = Math.floor(totalSeconds / 86400);

      const dayPart = days > 0 ? `${days} Tag${days === 1 ? '' : 'e'}, ` : '';
      els.status.textContent = `${dayPart}${pad(hours)}:${pad(minutes)}:${pad(seconds)} bis zur Enthüllung.`;
    }

    async function init() {
      try {
        hideError();
        const status = await fetchStatus();
        releaseAt = status.releaseAt;
        serverOffset = status.serverNow - Date.now();

        tick();
        countdownTimer = setInterval(tick, 250);

        if (status.revealed) {
          clearInterval(countdownTimer);
          updateTiles(0);
          revealHint();
        }
      } catch (error) {
        showError(error.message || 'Unbekannter Fehler.');
        els.status.textContent = 'Die Schrift bleibt stumm.';
      }
    }

    init();
  </script>
</body>
</html>
